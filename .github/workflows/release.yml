name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  build:
    needs: ci
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: clipygo-plugin-telegram-windows-x64.exe
            binary: target/x86_64-pc-windows-msvc/release/clipygo-plugin-telegram.exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: clipygo-plugin-telegram-linux-x64
            binary: target/x86_64-unknown-linux-gnu/release/clipygo-plugin-telegram

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: clipygo-plugin-telegram-macos-arm64
            binary: target/aarch64-apple-darwin/release/clipygo-plugin-telegram

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: cp ${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Compute SHA256
        shell: bash
        run: |
          if command -v sha256sum &>/dev/null; then
            sha256sum ${{ matrix.artifact }} | awk '{print $1}' > ${{ matrix.artifact }}.sha256
          else
            shasum -a 256 ${{ matrix.artifact }} | awk '{print $1}' > ${{ matrix.artifact }}.sha256
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/clipygo-plugin-telegram-windows-x64.exe
            artifacts/clipygo-plugin-telegram-windows-x64.exe.sha256
            artifacts/clipygo-plugin-telegram-linux-x64
            artifacts/clipygo-plugin-telegram-linux-x64.sha256
            artifacts/clipygo-plugin-telegram-macos-arm64
            artifacts/clipygo-plugin-telegram-macos-arm64.sha256
          generate_release_notes: true
